<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="floating-hearts" id="hearts-container"></div>

    <div class="container" style="max-width: 600px;">
        <main class="glass-card" style="padding: 4rem 2rem;">
            <section class="hero">
                <div class="hero-heart">💖</div>
                <h1 class="title-gradient" style="font-size: 4rem; margin-bottom: 0.5rem;">For My Princess</h1>
                <p class="subtitle" style="font-size: 1.25rem; margin-top: 1.5rem; letter-spacing: 0.5px; line-height: 1.8;">You are the best thing that has ever happened to my life.<br><br>Every moment with you is a treasure ❤️</p>
                <button class="btn-primary pulse-btn" id="revealBtn" onclick="showLove()" style="margin-top: 2rem; font-size: 1.3rem; padding: 15px 40px;">Click Me 💌</button>
            </section>

            <section class="message-section" id="messageSection">
                <h2>My Message to You</h2>
                <div style="background: rgba(255,255,255,0.2); padding: 1.5rem; border-radius: 15px; margin: 1.5rem 0; border: 1px dashed rgba(255, 77, 109, 0.4);">
                    <p id="loveText" style="margin:0; font-size: 1.3rem;">You make my world beautiful just by being in it. I love you more than words can express! ✨</p>
                </div>
                <a href="duniya.html" class="btn-primary" style="text-decoration: none; display: inline-block; margin-top: 1rem; margin-right: 10px;">Explore My Duniya 🌍</a>
                <a href="gift.html" class="btn-primary" style="text-decoration: none; display: inline-block; margin-top: 1rem; background: linear-gradient(45deg, #d8839d, #e5a4b5);">A Special Surprise 💝</a>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
